name: Frontend CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

# Assumes this repo is the frontend directory (package.json at root).
# For a monorepo, add a `paths:` filter on the trigger.

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned actions (audit R3-2) — tag-only pins let the publisher
      # silently swap action code via re-tagging. Backend cd.yml uses the
      # same SHAs; keep them in sync when bumping.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        # No `.eslintrc.*` lives in the repo right now + eslint v8 +
        # `--max-warnings 0` means any heuristic warning fails CI. Until
        # we land a proper config, lint is advisory — typecheck + build
        # are the hard gates.
        continue-on-error: true

      - name: Build (prod)
        # Using the placeholder API URL keeps the build deterministic.
        # The deployment pipeline rebuilds with the real VITE_API_URL.
        run: VITE_API_URL=https://api.example.com npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 14

      # ── npm audit (advisory, audit R2-14) ────────────────────
      # Surface known-vulnerable transitive dependencies. Advisory so a
      # freshly-disclosed CVE doesn't block deploys; once the repo has a
      # clean baseline, drop `continue-on-error` to make it a hard gate.
      # `--audit-level=high` skips noisy low/moderate findings (often
      # in dev-only tooling like vite plugins / type packages).
      - name: npm audit (high+ only)
        continue-on-error: true
        run: |
          npm audit --audit-level=high --omit=dev | tee npm-audit.txt

      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-audit-${{ github.sha }}
          path: npm-audit.txt
          retention-days: 14
