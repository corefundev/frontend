name: Frontend CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

# Assumes this repo is the frontend directory (package.json at root).
# For a monorepo, add a `paths:` filter on the trigger.

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned actions (audit R3-2) — tag-only pins let the publisher
      # silently swap action code via re-tagging. Backend cd.yml uses the
      # same SHAs; keep them in sync when bumping.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Stray-gitlink guard (AUD-14 #370, backend repo)
        # A mode-160000 tree entry is a submodule pointer. Without a
        # matching `.gitmodules` stanza it is a dangling pointer: it names
        # a commit that need not exist outside the committing machine, so a
        # fresh clone cannot resolve it. Two of these reached the backend's
        # main — agent scratch worktrees captured by an over-broad `git add`.
        # This repo is clean; the guard keeps it that way.
        run: |
          set -euo pipefail
          declared=""
          if [ -f .gitmodules ]; then
            # `|| true`: --get-regexp exits 1 on zero matches (an empty or
            # path-less .gitmodules); under pipefail that would fail the
            # guard itself instead of reporting the undeclared gitlink.
            declared=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | cut -d' ' -f2- || true)
          fi
          undeclared=""
          while read -r path; do
            [ -n "$path" ] || continue
            printf '%s\n' "$declared" | grep -qxF "$path" || undeclared="${undeclared}${path}"$'\n'
          done <<< "$(git ls-files --stage | awk '$1 == "160000" { print $4 }')"
          if [ -n "$undeclared" ]; then
            echo "::error::submodule pointer(s) with no .gitmodules declaration — a fresh clone cannot resolve them:"
            printf '%s' "$undeclared"
            echo "fix: git rm --cached <path> and add it to .gitignore"
            echo "if you meant to add a submodule, use git submodule add so .gitmodules records its URL"
            exit 1
          fi
          echo "no undeclared submodule pointers"

      - name: Error-sanitisation guard (AUD-2 #354, backend repo)
        # Client-facing pages must never render upload.error_message /
        # api error .detail raw — always through safeUploadError()/
        # errorMessage(). The #38 sweep missed OnboardingPage exactly
        # because nothing guarded the pattern; this grep is the guard.
        # Admin pages (src/pages/admin/) are operator-facing and exempt.
        run: |
          set -euo pipefail
          leaks=$(grep -rn '{upload\.error_message}\|{[a-z]*\.error_message}' \
                    src/pages src/features src/components \
                    --include='*.tsx' \
                  | grep -v 'src/pages/admin/' \
                  | grep -v 'safeUploadError' || true)
          if [ -n "$leaks" ]; then
            echo "::error::raw error_message render on a client-facing page — wrap with safeUploadError():"
            echo "$leaks"
            exit 1
          fi
          echo "no raw error_message renders on client-facing pages"

      - name: Lint
        run: npm run lint
        # No `.eslintrc.*` lives in the repo right now + eslint v8 +
        # `--max-warnings 0` means any heuristic warning fails CI. Until
        # we land a proper config, lint is advisory — typecheck + build
        # are the hard gates.
        continue-on-error: true

      - name: Build (prod)
        # Using the placeholder API URL keeps the build deterministic.
        # The deployment pipeline rebuilds with the real VITE_API_URL.
        run: VITE_API_URL=https://api.example.com npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 14

      # ── npm audit — hard gate ─────────────────────────────────
      # Audit R3-22 (2026-05-16) — promoted from advisory (R2-14)
      # to hard gate after the clean baseline window. `--audit-level
      # =high` keeps noise out (low/moderate findings in dev-only
      # tooling like vite plugins don't block); HIGH+ in runtime
      # deps now fails CI loudly so they can't slip into a deploy.
      # To temporarily ignore a known CVE, prefix the run with an
      # explicit allowlist comment + add `--exclude <pkg>` per case.
      - name: npm audit (high+ runtime deps)
        run: |
          npm audit --audit-level=high --omit=dev | tee npm-audit.txt

      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-audit-${{ github.sha }}
          path: npm-audit.txt
          retention-days: 14
