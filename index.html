<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sprosly</title>
    <meta name="description" content="Sprosly — прогноз спроса и автозаказ для розницы" />
    <meta name="theme-color" content="#2463EB" />

    <!--
      Minimal Content Security Policy for the SPA.

      ⚠ connect-src is intentionally broad (http:/https:) because the API
      host is configured at build time via VITE_API_URL. Tighten in your
      deployment by injecting the actual origin at build time, e.g.:

          <meta http-equiv="Content-Security-Policy"
                content="... connect-src 'self' https://api.example.com; ...">

      Notes:
        • 'unsafe-inline' on style-src is needed by Tailwind's base layer
          when loaded via <style> tags during dev — production builds emit
          external stylesheets and you can drop it.
        • 'unsafe-inline' on script-src is REQUIRED at runtime (audit R2-28,
          2026-05-15 — verified). Cloudflare injects an inline anti-bot
          challenge script (`<script>(function(){...CF$cv$params...})()
          </script>`) into responses served from the orange-cloud proxy.
          Removing 'unsafe-inline' would break that. Strict-dynamic /
          nonce-based tightening would require CF's cooperation per
          script; we accept 'unsafe-inline' as defence-in-depth gap.
        • img-src data: is needed for inline SVGs from recharts/toast.
        • frame-ancestors 'none' defends against clickjacking.
    -->
    <!--
      Note: the authoritative CSP is delivered as an HTTP header by nginx
      (see nginx/app.conf.template). Browsers enforce the intersection of
      meta + header CSPs, so this meta needs to be at least as permissive
      as the header — otherwise it silently blocks Turnstile / Google Fonts
      / api.testcore.ru calls. Keeping it broad here and authoritative in
      the header.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                   img-src 'self' data: blob:;
                   font-src 'self' data: https://fonts.gstatic.com;
                   connect-src 'self' https: wss:;
                   frame-src https://challenges.cloudflare.com;
                   base-uri 'self';
                   form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Referest typographic system:
        • Inter — single voice for display, body, UI. Excellent Cyrillic
          coverage; optimised for screen rendering.
        • JetBrains Mono — retained for mono.
      Only the weights we actually use (400 / 500 / 600 / 700 / 800)
      to keep FCP tight.

      Subresource Integrity (audit R2-11, 2026-05-15): NOT applied to
      this resource because Google Fonts rewrites the CSS payload per
      browser UA (woff vs woff2 vs ttf), so a static SHA-384 hash would
      break on every UA bucket. Defence-in-depth instead via CSP:
      `style-src` and `font-src` restrict origins to googleapis.com /
      gstatic.com (see meta CSP above + the authoritative header from
      nginx/app.conf.template). Same rationale applies to the
      Cloudflare Turnstile loader injected dynamically at
      src/pages/SignupVerifyPage.tsx:209 — `script-src` whitelists
      `challenges.cloudflare.com` and Cloudflare versions the loader
      URL, so MITM at the path-level can't slip a different script
      under the same `/v0/api.js`. Adding `crossorigin="anonymous"`
      on the stylesheet for the (future) day when both providers
      publish stable hashes.
    -->
    <link rel="stylesheet"
          crossorigin="anonymous"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p style="padding:24px;font-family:system-ui;">
        JavaScript is required to run this application.
      </p>
    </noscript>
  </body>
</html>
